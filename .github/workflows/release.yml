name: release

on:
  push:
    tags: ['v*']
  # Manual rescue trigger: re-run a real release from the Actions UI (e.g. when
  # the tag-push run failed). Optionally release a specific tag via the input.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3); leave blank to use the current ref'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # When dispatched with a tag input, check that tag out so goreleaser
          # releases the requested version. Empty ref falls back to the default.
          ref: ${{ inputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
